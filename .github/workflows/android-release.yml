name: Android Release APK

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Run tests
        run: ./gradlew test
      - name: Build release APK
        run: ./gradlew :app:assembleRelease
      - name: Generate auto changelog
        run: |
          chmod +x scripts/generate_changelog.sh
          scripts/generate_changelog.sh > CHANGELOG_AUTO.md
      - name: Create or update release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          gh release view "$TAG" >/dev/null 2>&1 || gh release create "$TAG" --title "$TAG" --notes-file CHANGELOG_AUTO.md
          gh release upload "$TAG" app/build/outputs/apk/release/app-release-unsigned.apk --clobber
