name: Android Release APK

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: gradle
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Run tests
        run: ./gradlew test

      - name: Determine signing availability
        id: signing
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ] && [ -n "$ANDROID_KEYSTORE_PASSWORD" ] && [ -n "$ANDROID_KEY_ALIAS" ] && [ -n "$ANDROID_KEY_PASSWORD" ]; then
            echo "mode=signed-release" >> "$GITHUB_OUTPUT"
            echo "Signing secrets detected: building signed release APK"
          else
            echo "mode=debug-fallback" >> "$GITHUB_OUTPUT"
            echo "Signing secrets missing: building installable debug APK fallback"
          fi

      - name: Build APK
        run: |
          if [ "${{ steps.signing.outputs.mode }}" = "signed-release" ]; then
            ./gradlew :app:assembleRelease
          else
            ./gradlew :app:assembleDebug
          fi

      - name: Select APK artifact
        id: apk
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [ "${{ steps.signing.outputs.mode }}" = "signed-release" ] && [ -f app/build/outputs/apk/release/app-release.apk ]; then
            SRC="app/build/outputs/apk/release/app-release.apk"
            NAME="glyphbound-${TAG}-signed.apk"
          else
            SRC="app/build/outputs/apk/debug/app-debug.apk"
            NAME="glyphbound-${TAG}-debug.apk"
          fi
          cp "$SRC" "$NAME"
          echo "path=$NAME" >> "$GITHUB_OUTPUT"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"

      - name: Generate auto changelog
        run: |
          chmod +x scripts/generate_changelog.sh
          scripts/generate_changelog.sh > CHANGELOG_AUTO.md

      - name: Create or update release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          gh release view "$TAG" >/dev/null 2>&1 || gh release create "$TAG" --title "$TAG" --notes-file CHANGELOG_AUTO.md
          gh release upload "$TAG" "${{ steps.apk.outputs.path }}" --clobber
